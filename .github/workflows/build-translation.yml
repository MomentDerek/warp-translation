name: Build Chinese Warp

# Builds the Chinese localization overlay end-to-end:
#   1. tools           — build + test the Rust extractor/builder (self-contained)
#   2. build-localized — clone upstream Warp, run the builder, publish build/warp-zh
#   3. package         — bundle installers on macOS + Linux (the real proof)
#   4. release         — on a tag push, publish those installers as a GitHub Release
#
# The `package` job mirrors upstream Warp's own build setup and is heavy; it is
# skipped automatically under `act` (which cannot emulate macOS). The `release`
# job runs only for tag pushes. See .github/workflows/README.md for local
# testing with act and how tagging cuts a release.

on:
  push:
    branches: [main]
    # Any tag push triggers a full build + GitHub Release (see the `release`
    # job). GitHub ANDs `paths` with branch pushes but NOT with tag pushes, so
    # tags fire regardless of which files the tagged commit touched — provided a
    # `branches` filter is also present (it is). See community discussion #26821.
    tags: ['*']
    paths:
      - 'tools/**'
      - 'translations/**'
      - '.github/workflows/build-translation.yml'
      - '.github/actions/build-localized-tree/**'
  pull_request:
    paths:
      - 'tools/**'
      - 'translations/**'
      - '.github/workflows/build-translation.yml'
      - '.github/actions/build-localized-tree/**'
  workflow_dispatch:
    inputs:
      warp_ref:
        description: 'Upstream warpdotdev/warp ref (commit SHA / branch / tag) to build against'
        required: false
        type: string
      build_packages:
        description: 'Build installable packages (Linux deb/rpm/AppImage + macOS unsigned .dmg)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: build-translation-${{ github.ref }}
  cancel-in-progress: true

env:
  # Upstream Warp commit that translations/strings.json was last extracted at
  # (translations/.lock.json is gitignored, so the pin lives here). Override
  # via the workflow_dispatch `warp_ref` input.
  # Pinned to upstream tag v0.2026.06.08.09.48.dev_00.
  DEFAULT_WARP_REF: b24fce3db869f7a8a62003e4e4e6fa3009b96d0d

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build + test the translation tools. Fully self-contained (no upstream
  #    Warp needed) — this is the fast job that `act` runs locally.
  # ---------------------------------------------------------------------------
  tools:
    name: Build & test translation tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Unit tests
        working-directory: tools
        run: cargo test --workspace

      # Lint signal — non-blocking so unrelated style drift never fails the build.
      - name: Format check (informational)
        working-directory: tools
        continue-on-error: true
        run: cargo fmt --all --check

      - name: Clippy (informational)
        working-directory: tools
        continue-on-error: true
        run: cargo clippy --all-targets

  # ---------------------------------------------------------------------------
  # 2. Produce the localized source tree and publish it as an artifact, plus a
  #    coverage summary. Cheap (no Warp compilation) — only string substitution.
  # ---------------------------------------------------------------------------
  build-localized:
    name: Build localized source tree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@1.92.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Resolve upstream Warp ref
        id: ref
        run: echo "value=${{ inputs.warp_ref || env.DEFAULT_WARP_REF }}" >> "$GITHUB_OUTPUT"

      - name: Build localized tree
        id: localize
        uses: ./.github/actions/build-localized-tree
        with:
          warp_ref: ${{ steps.ref.outputs.value }}
          run_check: 'true'

      - name: Coverage summary
        if: always()
        run: |
          set -euo pipefail
          REPORT=reports/build.json
          {
            echo "## Localized build report"
            echo ""
            echo "- Upstream ref: \`${{ steps.ref.outputs.value }}\`"
            echo "- Resolved commit: \`${{ steps.localize.outputs.source_commit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$REPORT" ] && command -v jq >/dev/null 2>&1; then
            jq -r '
              "- Files copied: \(.stats.files_copied)",
              "- Files modified (translated): \(.stats.files_modified)",
              "- Literals replaced: \(.stats.literals_replaced)",
              "- Literals kept English (fallback): \(.stats.literals_kept_english)",
              "- Parse failures: \(.stats.files_parse_failed)"
            ' "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- (build report unavailable)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Package localized tree
        run: tar -C build -czf warp-zh-src.tar.gz warp-zh

      - name: Upload localized source tree
        uses: actions/upload-artifact@v4
        with:
          name: warp-zh-src
          path: warp-zh-src.tar.gz
          retention-days: 7

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: reports/build.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 3. The real deliverable: build installable packages from the localized tree,
  #    mirroring upstream Warp's own release bundling (script/bundle).
  #      - Linux:  deb / rpm / AppImage  (no signing required)
  #      - macOS:  unsigned .dmg (--nosign; Gatekeeper warns on first open)
  #    A successful bundle also proves the translated source compiles in release
  #    mode. Heavy (full `cargo build --release`); skipped under `act` (macOS
  #    can't be emulated) and skippable via the build_packages dispatch input.
  # ---------------------------------------------------------------------------
  package:
    name: Package localized Warp (${{ matrix.os }})
    needs: build-localized
    # Heavy job (full release build on macOS + Linux). Run it only when it can
    # produce a release — on a tag push — or when explicitly dispatched. Plain
    # branch pushes / PRs get the cheap `tools` + `build-localized` signal only.
    # This also keeps the daily pipeline's `main` push (which lands the pin bump
    # right before pushing the release tag) from triggering a duplicate heavy
    # build alongside the tag's own package+release run.
    if: ${{ !github.event.act && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.build_packages)) }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Windows release builds are slow (full cargo --release + Inno Setup); the
    # 150 default was tuned for macOS/Linux. Bump to 180 to give Windows headroom.
    timeout-minutes: 180
    env:
      # The `oss` channel builds the self-contained `warp-oss` bin (inline
      # ChannelConfig, no Sentry), so it needs none of Warp's private
      # warp-channel-config tooling — the only OSS-buildable channel.
      CHANNEL: oss
      # deb/rpm derive their Version from GIT_RELEASE_TAG (`sed 's/^v//'`);
      # unset it and dpkg-deb fails with "version string is empty". On a tag
      # push, use the real tag so packages carry the released version; otherwise
      # fall back to a run-number stamp.
      GIT_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v0.0.{0}', github.run_number) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@1.92.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools

      - name: Resolve upstream Warp ref
        id: ref
        # Bash syntax (`>> "$GITHUB_OUTPUT"`); the Windows runner defaults to
        # pwsh, so pin git-bash explicitly to keep all three platforms uniform.
        shell: bash
        run: echo "value=${{ inputs.warp_ref || env.DEFAULT_WARP_REF }}" >> "$GITHUB_OUTPUT"

      - name: Build localized tree
        id: localize
        uses: ./.github/actions/build-localized-tree
        with:
          warp_ref: ${{ steps.ref.outputs.value }}

      # Cache upstream Warp's dependency builds — this is the package job's long
      # pole (a cold `cargo build --release` of Warp's huge dep tree, ~1h on the
      # macOS runner). Keyed on the localized tree's Cargo.lock (stable for a
      # given upstream ref) + rustc + runner OS, so day-to-day runs whose
      # Cargo.lock is unchanged restore deps and only recompile the Warp app
      # crates (which carry the translated strings). A new ref that bumps deps is
      # a clean miss (full rebuild) — no worse than today. rust-cache prunes the
      # workspace members' own artifacts, so the cache holds deps, not the whole
      # target/. Must run AFTER localize (the tree, and its Cargo.lock, only
      # exist once the builder has produced build/warp-zh).
      - name: Cache upstream Warp build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ steps.localize.outputs.out_dir }}
          prefix-key: warp-build
          cache-on-failure: true

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Install Node (for build.rs command-signature generation)
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Go (some bundle steps need it)
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install build + bundle dependencies (Linux)
        if: runner.os == 'Linux'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        run: |
          sudo apt-get update -y
          ./script/linux/install_build_deps
          # AppImage tooling (linuxdeploy) dlopens libfuse.so.2, which ubuntu-24.04
          # runners no longer ship by default.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2 || true
          ./script/install_cargo_release_deps || echo "::warning::install_cargo_release_deps reported errors (continuing)"
          ./script/linux/install_linuxdeploy
          ./script/install_cargo_bundle

      - name: Install build + bundle dependencies (macOS)
        if: runner.os == 'macOS'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        run: |
          # Private warp-channel-config is unavailable on public runners — keep
          # optional dep installs non-fatal.
          ./script/install_cargo_build_deps || echo "::warning::install_cargo_build_deps reported errors (continuing)"
          ./script/install_cargo_release_deps || echo "::warning::install_cargo_release_deps reported errors (continuing)"
          ./script/install_cargo_bundle
          brew install create-dmg
          rustup target add aarch64-apple-darwin

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        shell: pwsh
        run: |
          # install_cargo_release_deps runs install_cargo_build_deps internally,
          # then `cargo install cargo-about` (needed for third-party license
          # generation in prepare_bundled_resources.ps1). Mirrors the macOS/Linux
          # deps steps; non-fatal like them.
          bash ./script/install_cargo_release_deps; if (-not $?) { Write-Output "::warning::install_cargo_release_deps reported errors (continuing)" }

      - name: Bundle Linux packages (deb / rpm / AppImage)
        id: bundle_linux
        if: runner.os == 'Linux'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        run: script/bundle --channel "$CHANNEL" --packages appimage,deb,rpm

      - name: Bundle macOS unsigned .dmg
        id: bundle_macos
        if: runner.os == 'macOS'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        env:
          MACOSX_DEPLOYMENT_TARGET: '14.0'
        run: script/bundle --nosign --channel "$CHANNEL" --arch aarch64 --dmg-name-suffix arm64

      - name: Bundle Windows installer (oss x64)
        id: bundle_windows
        if: runner.os == 'Windows'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        shell: pwsh
        run: .\script\windows\bundle.ps1 -CHANNEL oss -ARCH x64 -RELEASE_TAG "$env:GIT_RELEASE_TAG"

      - name: Collect installers
        id: collect
        # Bash collection logic; macOS/Linux only. Windows uses the pwsh
        # "Collect installer (Windows)" step below.
        if: runner.os != 'Windows'
        shell: bash
        working-directory: ${{ steps.localize.outputs.out_dir }}
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/dist-out"
          mkdir -p "$OUT"
          if [ "${{ runner.os }}" = "Linux" ]; then
            PKGS="${{ steps.bundle_linux.outputs.packages_dir }}"
            if [ -z "$PKGS" ] || [ ! -d "$PKGS" ]; then
              PKGS="$(find target -type d -path '*/bundle/linux' | head -1)"
            fi
            echo "Packages dir: $PKGS"
            find "$PKGS" -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -exec cp -v {} "$OUT/" \;
          else
            DMG="${{ steps.bundle_macos.outputs.dmg_path }}"
            if [ -z "$DMG" ] || [ ! -f "$DMG" ]; then
              DMG="$(find target -name '*.dmg' -type f | head -1)"
            fi
            echo "DMG: $DMG"
            cp -v "$DMG" "$OUT/"
          fi
          echo "--- collected ---"
          ls -la "$OUT"

      - name: Collect installer (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ steps.localize.outputs.out_dir }}
        shell: pwsh
        run: |
          $out = "$env:GITHUB_WORKSPACE\dist-out"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $exe = ".\script\windows\Output\WarpOssSetup.exe"
          if (-not (Test-Path $exe)) { $exe = (Get-ChildItem -Recurse -Filter '*Setup*.exe' .\script\windows\Output | Select-Object -First 1).FullName }
          Write-Output "Installer: $exe"
          Copy-Item $exe $out -Verbose
          Get-ChildItem $out

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: warp-zh-installer-${{ matrix.os }}
          path: dist-out/**
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. On a tag push, publish a GitHub Release with every installer the
  #    `package` matrix produced — macOS unsigned .dmg + Linux deb/rpm/AppImage.
  #    Only runs for tag pushes; normal branch/PR/dispatch builds skip it.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: package
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases + upload assets (overrides top-level read)
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: warp-zh-installer-*
          path: dist
          merge-multiple: true

      - name: List release assets
        run: |
          set -euo pipefail
          echo "Assets to publish:"
          find dist -type f -print

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(find dist -type f)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "::error::No installer assets found to release"
            exit 1
          fi
          # 自定义说明：macOS 安装包未签名，首次打开会被 Gatekeeper 拦截。
          # 这段文字会出现在 release 正文最前面；--generate-notes 自动生成的
          # 变更日志会追加在它之后。
          NOTES=$(cat <<'EOF'
          ## 🍎 macOS 安装提示

          `WarpOss-arm64.dmg` 为 **未签名 / 未公证** 的 OSS 构建（Apple Silicon / arm64）。
          首次打开若提示「**已损坏，无法打开。**」或「无法验证开发者」，**并非文件损坏**，
          只是被 Gatekeeper 的隔离属性拦下。把 `WarpOss.app` 拖入「应用程序」后执行：

          ```bash
          xattr -dr com.apple.quarantine /Applications/WarpOss.app
          ```

          之后即可正常启动。详见 [README — 安装并绕过 Gatekeeper](https://github.com/${{ github.repository }}#安装并绕过-gatekeeper)。

          ---
          EOF
          )
          # Channel-suffixed tags (e.g. v0.2026.06.05.09.22.dev / .preview)
          # track an upstream dev/preview build → mark as a GitHub pre-release.
          # Plain stable version tags (v0.2026.06.03.09.49) are full releases.
          PRERELEASE=()
          case "$TAG" in
            *dev*|*preview*|*rc*) PRERELEASE=(--prerelease) ;;
          esac
          # Idempotent: re-running the same tag updates assets instead of failing.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets (clobber)."
            gh release upload "$TAG" "${ASSETS[@]}" --repo "$REPO" --clobber
          else
            echo "Creating release $TAG (prerelease: ${PRERELEASE[*]:-no})."
            gh release create "$TAG" "${ASSETS[@]}" \
              --repo "$REPO" \
              --title "$TAG" \
              --notes "$NOTES" \
              --generate-notes \
              "${PRERELEASE[@]}"
          fi
